name: openenv-email-triage
version: 1.0.0
description: Email inbox triage and response environment
tasks:
  - id: task_urgent_detection
    difficulty: easy
    description: Flag all urgent emails with minimal false positives
  - id: task_efficient_processing
    difficulty: medium
    description: Maximize throughput within time budget
  - id: task_holistic_management
    difficulty: hard
    description: Balance urgency, importance, cost, and response quality
action_space: [read, archive, flag, respond, delegate, skip]
observation_keys: [email_id, sender, subject, urgency, category, inbox_size, time_budget_remaining]
